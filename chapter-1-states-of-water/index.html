<!DOCTYPE html>
<html>
<head>
    <title>States of Water</title>
</head>
<body>

<h1>🌊 States of Water</h1>
<p>🏆 XP: <span id="xp">0</span></p>
<p>Are Ice and Water same?</p>

<button onclick="answer('same')">Same</button>
<button onclick="answer('different')">Different</button>

<p id="result"></p>

<script>
let xp = 0;

function answer(choice) {
    let result = document.getElementById("result");
    let xpDisplay = document.getElementById("xp");

    if (choice === "same") {
        result.innerText = "✅ Correct! Ice and water are same substance.";
        xp += 10;
    } else {
        result.innerText = "❌ Try again!";
    }

    xpDisplay.innerText = xp;
}
</script>

</body>
</html>
